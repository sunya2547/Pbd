<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday to my Luangmae</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Kanit:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-blue: #00539C;
            --navy: #001F3F;
            --sky: #4FA8DA;
            --gold: #F0C419;
            --gold-soft: #FFE9A8;
            --ivory: #F5F8FC;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Tahoma', 'Arial', sans-serif;
            background-color: #00539C;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background 1.2s ease;
        }

        /* ธีมตอนนับถอยหลัง */
        body.night-mode {
            background: radial-gradient(circle at 50% 30%, var(--deep-blue) 0%, var(--navy) 65%);
        }

        /* Canvas พลุ + คอนเฟตตี้ */
        #fireworks-canvas {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* สไตล์กล่องข้อความ Windows 95 */
        .win-box {
            background: #c0c0c0;
            border: 2px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #000000;
            border-bottom-color: #000000;
            box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080;
            padding: 2px;
            width: 85%;
            max-width: 300px;
            position: absolute;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        .active {
            opacity: 1;
            pointer-events: all;
        }

        .title-bar {
            background: #000080;
            color: white;
            padding: 3px 5px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-close {
            background: #c0c0c0;
            border: 2px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #000000;
            border-bottom-color: #000000;
            font-weight: bold;
            font-size: 10px;
            padding: 1px 4px;
            cursor: pointer;
            color: black;
        }

        .content {
            padding: 15px;
            text-align: center;
            font-size: 14px;
            color: black;
        }

        input[type="date"] {
            margin: 15px 0;
            padding: 4px;
            font-family: 'Tahoma', sans-serif;
            border: 2px solid;
            border-top-color: #808080;
            border-left-color: #808080;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
            width: 80%;
        }

        button.win-btn {
            background: #c0c0c0;
            border: 2px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #000000;
            border-bottom-color: #000000;
            padding: 5px 20px;
            font-family: 'Tahoma', sans-serif;
            font-size: 14px;
            cursor: pointer;
            color: black;
            margin-top: 10px;
        }

        button.win-btn:active {
            border-top-color: #000000;
            border-left-color: #000000;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
            box-shadow: inset 1px 1px #808080;
        }

        #countdown-text {
            position: relative;
            display: none;
            z-index: 20;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: clamp(90px, 22vw, 160px);
            background: linear-gradient(180deg, var(--gold-soft) 0%, var(--gold) 60%, #C8960B 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 22px rgba(240, 196, 25, 0.55));
            transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), opacity 0.25s ease;
        }

        #final-screen {
            display: none;
            position: relative;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 20;
            font-family: 'Poppins', sans-serif;
            color: var(--ivory);
            width: 100%;
            max-width: 480px;
            padding: 28px 24px;
            opacity: 0;
            transform: translateY(14px);
            animation: riseIn 1s cubic-bezier(.22,1,.36,1) forwards;
        }

        @keyframes riseIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* แสงนวลด้านหลังการ์ด — signature element */
        #final-screen::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 340px;
            height: 340px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(240,196,25,0.28) 0%, rgba(79,168,218,0.12) 45%, transparent 72%);
            filter: blur(6px);
            z-index: -1;
            animation: pulseGlow 4s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
        }

        .eyebrow {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--sky);
            margin: 0 0 10px;
        }

        #final-screen h1 {
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 800;
            line-height: 1.3;
            margin: 0 0 8px;
            background: linear-gradient(180deg, #ffffff 0%, var(--gold-soft) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 24px rgba(240,196,25,0.25);
        }

        #final-screen > p {
            font-size: 14px;
            font-weight: 400;
            color: rgba(245,248,252,0.75);
            margin: 0 0 22px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
        }

        .stat-box {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.14);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 14px 4px;
        }

        .stat-num {
            display: block;
            font-size: clamp(20px, 5vw, 26px);
            font-weight: 700;
            color: var(--gold);
            text-shadow: 0 0 12px rgba(240,196,25,0.35);
            font-variant-numeric: tabular-nums;
        }

        .stat-label {
            display: block;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(245,248,252,0.6);
            margin-top: 4px;
        }

        @media (prefers-reduced-motion: reduce) {
            #final-screen, #final-screen::before, #countdown-text {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>

    <!-- ซ่อน Video YouTube ไว้ทำเป็น BGM -->
    <div style="display:none;" id="youtube-player"></div>

    <!-- พลุ + คอนเฟตตี้ -->
    <canvas id="fireworks-canvas"></canvas>

    <!-- กล่องใส่วันเกิด -->
    <div id="step1" class="win-box active">
        <div class="title-bar">
            <span>Message</span>
            <button class="title-close">X</button>
        </div>
        <div class="content">
            <p>กรุณายืนยันวันเกิดของคุณเพื่อเข้าใช้งาน:</p>
            <input type="date" id="bday-input">
            <br>
            <button class="win-btn" onclick="startTroll()">Submit</button>
        </div>
    </div>

    <!-- รูปแบบกล่องข้อความ -->
    <div id="step2" class="win-box">
        <div class="title-bar">
            <span>Error</span>
            <button class="title-close">X</button>
        </div>
        <div class="content">
            <div style="display: flex; align-items: center; margin-bottom: 15px;">
                <div style="background: red; color: white; border-radius: 50%; width: 25px; height: 25px; display: inline-flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; margin-right: 15px; flex-shrink: 0;">X</div>
                <p id="troll-msg" style="margin: 0; text-align: left;">อุ้ย กดไม่โดน</p>
            </div>
            <button class="win-btn" onclick="nextTroll()">OK</button>
        </div>
    </div>

    <!-- Countdown -->
    <div id="countdown-text">3</div>

    <!-- Final screen -->
    <div id="final-screen">
        <p class="eyebrow">Today, we celebrate</p>
        <h1>Happy Birthday to my Luangmae</h1>
        <p>How far we have grown-up together</p>
        <div class="stat-grid" id="timer">
            <div class="stat-box"><span class="stat-num" id="statYears">0</span><span class="stat-label">Years</span></div>
            <div class="stat-box"><span class="stat-num" id="statMonths">0</span><span class="stat-label">Months</span></div>
            <div class="stat-box"><span class="stat-num" id="statDays">0</span><span class="stat-label">Days</span></div>
            <div class="stat-box"><span class="stat-num" id="statHours">0</span><span class="stat-label">Hours</span></div>
            <div class="stat-box"><span class="stat-num" id="statMinutes">0</span><span class="stat-label">Minutes</span></div>
            <div class="stat-box"><span class="stat-num" id="statSeconds">0</span><span class="stat-label">Seconds</span></div>
        </div>
    </div>

    <!-- YouTube IFrame API Script -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- ส่วนที่ 1: ตั้งค่า Youtube BGM (Autoplay แบบบังคับ) ---
        let player;
        let isMusicPlaying = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                videoId: '0i4UH2lK4ag',
                playerVars: {
                    'autoplay': 1, // พยายาม Autoplay ทันที
                    'controls': 0,
                    'loop': 1,
                    'playlist': '0i4UH2lK4ag',
                    'playsinline': 1 // ช่วยให้เล่นบน iOS ได้ดีขึ้น
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            // ลองสั่งเล่นเพลงทันที
            event.target.playVideo();
            
            // ตรวจจับการแตะหน้าจอครั้งแรก หากเบราว์เซอร์บล็อกเสียงไว้
            document.body.addEventListener('click', function playAudioOnFirstClick() {
                if(!isMusicPlaying && player && typeof player.playVideo === 'function') {
                    player.playVideo();
                    isMusicPlaying = true;
                    // ลบ Event ออกเพื่อไม่ให้ทำงานซ้ำซ้อน
                    document.body.removeEventListener('click', playAudioOnFirstClick);
                }
            }, { once: true });
            
            // Touchstart บนมือถือ
            document.body.addEventListener('touchstart', function playAudioOnFirstTouch() {
                if(!isMusicPlaying && player && typeof player.playVideo === 'function') {
                    player.playVideo();
                    isMusicPlaying = true;
                    document.body.removeEventListener('touchstart', playAudioOnFirstTouch);
                }
            }, { once: true });
        }

        // --- ส่วนที่ 2: ตั้งค่าตัวแปรวันที่ (15 May 2017) ---
        const metDate = new Date("2017-05-15T00:00:00");

        let trollStep = 1;
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const trollMsg = document.getElementById('troll-msg');
        const countdownText = document.getElementById('countdown-text');
        const finalScreen = document.getElementById('final-screen');

        function startTroll() {
            const bday = document.getElementById('bday-input').value;

            if (bday !== '2004-07-16') {
                alert("กรุณาใส่วันเกิดให้ถูกก่อนสิคะ อีแก่!");
                return;
            }

            step1.classList.remove('active');

            setTimeout(() => {
                moveBoxRandomly();
                step2.classList.add('active');
            }, 300);
        }

        function nextTroll() {
            step2.classList.remove('active');
            trollStep++;

            const messages = {
                2: "เมื่อไหร่จะโดน",
                3: "มีอะไรจะบอก",
                4: "กุดีใจที่มึงทักกุนะ วันแรกที่เจอกัน",
                5: "กุดีใจที่ได้โตมาด้วยกัน",
                6: "ใช่...ชีวิตมันยาก แต่กุว่ามึงเก่งมากเลยว่ะที่ผ่านมาได้",
                7: "มันไม่ใช่ว่าแค่เรื่องเล็กๆทำไมต้องคิดมาก แต่แค่เรื่องเล็กๆทำไมถึงไม่ทำให้สบายใจ",
                8: "อยู่กับกุไปนานๆนะ"
            };

            if (messages[trollStep]) {
                trollMsg.innerText = messages[trollStep];
                setTimeout(() => { moveBoxRandomly(); step2.classList.add('active'); }, 200);
            } else {
                startCountdown();
            }
        }

        let lastX = window.innerWidth / 2;
        let lastY = window.innerHeight / 2;

        function moveBoxRandomly() {
            const boxWidth = step2.offsetWidth || 280;
            const boxHeight = step2.offsetHeight || 120;
            const maxX = Math.max(10, window.innerWidth - boxWidth - 20);
            const maxY = Math.max(10, window.innerHeight - boxHeight - 20);

            let newX, newY, distance = 0, attempts = 0;

            do {
                newX = 10 + Math.random() * (maxX - 10);
                newY = 10 + Math.random() * (maxY - 10);
                const dx = newX - lastX;
                const dy = newY - lastY;
                distance = Math.sqrt(dx * dx + dy * dy);
                attempts++;
            } while (distance < 150 && attempts < 50);

            lastX = newX;
            lastY = newY;

            step2.style.left = newX + 'px';
            step2.style.top = newY + 'px';
        }

        function startCountdown() {
            document.body.classList.add('night-mode');
            document.getElementById('fireworks-canvas').style.display = 'block';
            startFireworks();

            countdownText.style.display = 'block';
            let count = 3;
            countdownText.innerText = count;

            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownText.style.transform = 'scale(0.8)';
                    countdownText.style.opacity = '0.4';
                    setTimeout(() => {
                        countdownText.innerText = count;
                        countdownText.style.transform = 'scale(1.15)';
                        countdownText.style.opacity = '1';
                    }, 50);
                } else {
                    clearInterval(interval);
                    countdownText.style.display = 'none';
                    showFinalScreen();
                }
            }, 1000);
        }

        function showFinalScreen() {
            finalScreen.style.display = 'flex';
            burstConfetti();
            playFanfare();
            setInterval(updateTimer, 1000);
            updateTimer();
        }

        // --- ส่วนคำนวณเวลา ---
        function updateTimer() {
            const now = new Date();
            let d = new Date(now);

            let y = d.getFullYear() - metDate.getFullYear();
            let m = d.getMonth() - metDate.getMonth();
            let dt = d.getDate() - metDate.getDate();

            if (dt < 0) {
                m--;
                let temp = new Date(d.getFullYear(), d.getMonth(), 0);
                dt += temp.getDate();
            }
            if (m < 0) { y--; m += 12; }

            let hr = d.getHours() - metDate.getHours();
            if (hr < 0) { dt--; hr += 24; }

            let min = d.getMinutes() - metDate.getMinutes();
            if (min < 0) { hr--; min += 60; }

            let sec = d.getSeconds() - metDate.getSeconds();
            if (sec < 0) { min--; sec += 60; }

            document.getElementById('statYears').textContent = y;
            document.getElementById('statMonths').textContent = m;
            document.getElementById('statDays').textContent = dt;
            document.getElementById('statHours').textContent = hr;
            document.getElementById('statMinutes').textContent = min;
            document.getElementById('statSeconds').textContent = sec;
        }

        // --- ระบบเสียง Fanfare (Web Audio API, ไม่ต้องใช้ไฟล์เสียงภายนอก) ---
        function playFanfare() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    const startTime = ctx.currentTime + i * 0.14;
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.18, startTime + 0.03);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.4);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(startTime);
                    osc.stop(startTime + 0.45);
                });
            } catch (e) { /* audio not available, fail silently */ }
        }

        // --- ระบบพลุ + คอนเฟตตี้ (Canvas) ---
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        let confetti = [];
        const palette = ['#F0C419', '#FFE9A8', '#4FA8DA', '#00539C', '#F5F8FC'];

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        function createFirework(x, y) {
            const particleCount = 60;
            const color = palette[Math.floor(Math.random() * palette.length)];
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * (Math.random() * 10),
                    vy: (Math.random() - 0.5) * (Math.random() * 10),
                    color,
                    alpha: 1,
                    decay: Math.random() * 0.015 + 0.015
                });
            }
        }

        function burstConfetti() {
            for (let i = 0; i < 140; i++) {
                confetti.push({
                    x: Math.random() * canvas.width,
                    y: -20 - Math.random() * canvas.height * 0.4,
                    w: 6 + Math.random() * 5,
                    h: 4 + Math.random() * 6,
                    vx: (Math.random() - 0.5) * 2.5,
                    vy: 2 + Math.random() * 3,
                    rotation: Math.random() * 360,
                    vr: (Math.random() - 0.5) * 8,
                    color: palette[Math.floor(Math.random() * palette.length)],
                    life: 0
                });
            }
        }

        function startFireworks() {
            function animate() {
                requestAnimationFrame(animate);
                ctx.globalCompositeOperation = 'destination-out';
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalCompositeOperation = 'lighter';

                particles.forEach((p, index) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.05;
                    p.alpha -= p.decay;

                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = Math.max(0, p.alpha);
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
                    ctx.fill();

                    if (p.alpha <= 0) particles.splice(index, 1);
                });

                ctx.globalCompositeOperation = 'source-over';
                confetti.forEach((c, index) => {
                    c.x += c.vx;
                    c.y += c.vy;
                    c.rotation += c.vr;
                    c.life++;

                    ctx.save();
                    ctx.globalAlpha = c.life > 500 ? Math.max(0, 1 - (c.life - 500) / 100) : 1;
                    ctx.translate(c.x, c.y);
                    ctx.rotate((c.rotation * Math.PI) / 180);
                    ctx.fillStyle = c.color;
                    ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
                    ctx.restore();

                    if (c.y > canvas.height + 30 || c.life > 600) confetti.splice(index, 1);
                });
                ctx.globalAlpha = 1;

                if (Math.random() < 0.04) {
                    createFirework(Math.random() * canvas.width, Math.random() * (canvas.height * 0.6));
                }
            }
            animate();
        }
    </script>
</body>
</html>
